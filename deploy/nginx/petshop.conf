server {
    listen 80;
    server_name 192.168.132.128;

    root /usr/share/nginx/petshop;
    index index.html;

    access_log /var/log/nginx/petshop-access.log;
    error_log /var/log/nginx/petshop-error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /legacy/ {
        proxy_pass http://127.0.0.1:8080/legacy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /h2-console/ {
        proxy_pass http://127.0.0.1:8080/h2-console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
